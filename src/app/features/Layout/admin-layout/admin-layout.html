<div class="layout-wrapper">
    <app-sidebar [isOpen]="isSidebarOpen" (closeMenu)="onToggleSidebar()"></app-sidebar>
    <div class="main-content">
        <app-header (toggleSidebarMenu)="onToggleSidebar()"></app-header>
        <div class="page-body">
            <router-outlet></router-outlet>
        </div>
    </div>
</div>

<!-- Global Low Stock / Out of Stock alerts (Floating toasts in bottom right) -->
<div class="global-alert-container" *ngIf="isAlertEnabled && lowStockProducts.length > 0">
    <div class="global-alert-card" *ngFor="let p of lowStockProducts" [class.out-of-stock]="(p.stock !== undefined ? p.stock : p.quantity) == 0">
        <button class="close-alert-btn" (click)="dismissAlert(p.id)">&times;</button>
        <div class="alert-icon">
            <i class="fas" [class.fa-ban]="(p.stock !== undefined ? p.stock : p.quantity) == 0" [class.fa-exclamation-triangle]="(p.stock !== undefined ? p.stock : p.quantity) > 0"></i>
        </div>
        <div class="alert-content">
            <h4>{{ (p.stock !== undefined ? p.stock : p.quantity) == 0 ? 'Out of Stock Alert!' : 'Low Stock Alert!' }}</h4>
            <p>Medicine: <strong>{{ p.name || p.title }}</strong></p>
            <small>
              Remaining: <span class="stock-count"><strong>{{ p.stock !== undefined ? p.stock : p.quantity }}</strong></span> units left
            </small>
        </div>
    </div>
</div>
